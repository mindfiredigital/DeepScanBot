name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GO_VERSION: "1.22.4"
  NODE_VERSION: "20"
  GORELEASER_VERSION: "~> v2"

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go dependencies
        run: go mod download

      - name: Verify Go modules
        run: go mod verify

      - name: Build Go binary
        run: go build -v -o /dev/null ./apps/cli

      - name: Run Go tests
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

      - name: Check Go formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi
          echo "All files are properly formatted."

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --out-format=colored-line-number
          skip-cache: false

      - name: Vet Go code
        run: go vet ./...

  goreleaser-check:
    name: Verify GoReleaser Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ${{ env.GORELEASER_VERSION }}
          install-only: true

      - name: Check GoReleaser configuration
        run: goreleaser check

      - name: Test GoReleaser snapshot build
        run: goreleaser release --snapshot --clean --skip=publish --skip=announce

      - name: Verify dist/ output
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo ""
          echo "=== Binary files ==="
          find dist/ -type f -name "my-cli*" -exec file {} \;
          echo ""
          echo "=== Checksums ==="
          cat dist/checksums.txt 2>/dev/null || echo "No checksums file found"

  cross-platform:
    name: Cross-Platform Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v -o /dev/null ./apps/cli
        env:
          CGO_ENABLED: 0

  npm-package-check:
    name: npm Package Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate package.json
        run: |
          node -e "
            const pkg = require('./package.json');
            const required = ['name', 'version', 'bin', 'scripts', 'files'];
            required.forEach(field => {
              if (!pkg[field]) throw new Error('Missing required field: ' + field);
            });
            console.log('package.json validation: OK');
            console.log('Package name:', pkg.name);
            console.log('Version:', pkg.version);
            console.log('Binaries:', Object.keys(pkg.bin).join(', '));
          "

      - name: Check postinstall.js syntax
        run: node --check postinstall.js

      - name: Check scripts syntax
        run: |
          for f in scripts/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done
